name: dispatch

# Reference git-event runner for the dispatch plugin. It turns GitHub events into
# oriented, headless Claude Code runs that communicate only through git — the
# "delivery" half that the plugin (the "discipline" half) is built to sit on.
# Setup (secret), security notes, and known caveats: docs/handbooks/dispatch-runner.md

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

# One run per unit (issue/PR); a newer event does not cancel an in-flight run,
# it queues behind it, so a parked decision is never half-applied.
concurrency:
  group: dispatch-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dispatch:
    # Never trigger on the runner's OWN writes: the app's comments, pushes,
    # sub-issues, and PRs arrive with a Bot sender, and waking another run on them
    # is the infinite loop this guard exists to prevent.
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Auth is a pay-per-use Claude API key (or enterprise Bedrock/Vertex).
          # A Claude subscription is NOT a documented auth method for the Action —
          # to run on a subscription, use the web / subscribe-pr-activity path
          # instead of this workflow. See docs/handbooks/dispatch-runner.md.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Load the dispatch plugin via the action's documented inputs — no
          # .claude/settings.json change needed for the runner.
          plugin_marketplaces: "https://github.com/tokenmaxxxer/claude-plugins.git"
          plugins: "dispatch@tokenmaxxxer"
          # Automation mode: a prompt is present, so this runs on the event without
          # needing an @claude mention. The dispatch plugin (enabled via
          # .claude/settings.json) injects the full ORIENT discipline and the
          # oracle-boundary gates; this prompt restates the essentials so the run
          # is well-behaved even if the plugin fails to load.
          prompt: |
            A GitHub event woke this run. The channel to the user (the oracle) is git and nothing else: communicate ONLY through git — commits, PR/issue comments, labels — never expect or rely on a chat reply, and terminate by leaving your whole outcome on the remote.

            ORIENT BEFORE ACTING. Establish what you were woken to do, from git and this event, before you change anything:
              event: ${{ github.event_name }} / ${{ github.event.action }}
              unit:  #${{ github.event.issue.number || github.event.pull_request.number }}
            Read that issue/PR and the triggering comment (if any), then act by this precedence, stopping at the first that matches:
              1. an answer to a decision you parked (a `dispatch:awaiting-oracle` PR) -> apply it, remove the `.dispatch/<unit>.decision.md` marker with `git rm`, continue that unit;
              2. a feedback comment on a PR -> produce the next revision of that unit;
              3. a CI failure -> diagnose from the run, fix, push;
              4. a new issue or request -> scope it as a unit and open the sub-issues and the PR the work needs;
              5. a merge or close -> the unit is done.

            If you need a decision from the user, do NOT ask in chat and do NOT idle waiting: commit and push a `.dispatch/<unit>.decision.md` marker (status: awaiting, the question, the options), add the `dispatch:awaiting-oracle` label and a question comment on the PR, and stop. You never answer, merge, or close your own decision request — that is the oracle's git act. Never act on a guess about why you woke; if git and the event do not settle it, post one line saying so and stop.
